name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  # Allow manual triggers
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate date-based tag (YYYYMMDD.Iteration)
        id: datetag
        run: |
          DATE=$(date -u +%Y%m%d)
          echo "tag=${DATE}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # YYYYMMDD.Iteration (e.g. 20260628.1) on every push to main
            type=raw,value=${{ steps.datetag.outputs.tag }},enable={{is_default_branch}}
            # latest tag on main branch pushes
            type=raw,value=latest,enable={{is_default_branch}}
            # branch name (e.g. main)
            type=ref,event=branch
            # git tag (e.g. v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # major.minor (e.g. v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # short SHA for every push
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max