name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  docker-build:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: bfl-openai-image-proxy:ci
          load: true

      - name: Verify /health responds
        run: |
          set -e
          docker run -d --name proxy-ci -p 8000:8000 \
            -e BFL_API_KEY=dummy \
            bfl-openai-image-proxy:ci
          # Wait for the server to come up
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "Health check passed"
              curl -s http://127.0.0.1:8000/health
              break
            fi
            sleep 1
          done
          # Fail if the health endpoint never responded
          curl -sf http://127.0.0.1:8000/health || { echo "Health check failed"; exit 1; }
          docker stop proxy-ci || true